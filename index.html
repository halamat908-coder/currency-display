<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bashoor Exchange - Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      border: none;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      position: fixed;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }
  </style>
</head>
<body>

  <iframe
    id="mainFrame"
    src="https://bashoorexchange.com"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
  ></iframe>

  <canvas id="keepAlive"></canvas>

  <script>
    function fitIframe() {
      const iframe = document.getElementById('mainFrame');

      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      // The site's natural portrait dimensions
      const siteW = 900;
      const siteH = 1600;

      if (screenH > screenW) {
        // ── Already Portrait ──
        const scale = Math.min(screenW / siteW, screenH / siteH);
        const offsetX = (screenW - siteW * scale) / 2;
        const offsetY = (screenH - siteH * scale) / 2;

        iframe.style.width = siteW + 'px';
        iframe.style.height = siteH + 'px';
        iframe.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        iframe.style.transformOrigin = 'top left';

      } else {
        // ── Landscape TV → rotate site 90° to show portrait ──
        const scale = Math.min(screenH / siteW, screenW / siteH);
        const offsetX = (screenW - siteH * scale) / 2;
        const offsetY = screenH - (screenH - siteW * scale) / 2;

        iframe.style.width = siteW + 'px';
        iframe.style.height = siteH + 'px';
        iframe.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(-90deg) scale(${scale})`;
        iframe.style.transformOrigin = 'top left';
      }
    }

    window.addEventListener('load', fitIframe);
    window.addEventListener('resize', fitIframe);
    document.getElementById('mainFrame').addEventListener('load', fitIframe);
    fitIframe();

    // ── Keep-Alive Engine ────────────────────────────────────────
    const canvas = document.getElementById('keepAlive');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      setInterval(() => {
        gl.clearColor(Math.random(), Math.random(), Math.random(), 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
      }, 20000);
    }

    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (AudioCtx) {
        const audioCtx = new AudioCtx();
        setInterval(() => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          gain.gain.value = 0;
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.01);
        }, 30000);
      }
    } catch(e) {}

    setInterval(() => {
      document.dispatchEvent(new MouseEvent('mousemove', {
        bubbles: true,
        cancelable: true,
        clientX: Math.floor(Math.random() * window.innerWidth),
        clientY: Math.floor(Math.random() * window.innerHeight)
      }));
    }, 25000);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        setTimeout(() => { window.focus(); }, 1000);
      }
    });

    setInterval(() => {
      const iframe = document.getElementById('mainFrame');
      iframe.src = iframe.src;
    }, 55 * 60 * 1000);

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          const wl = await navigator.wakeLock.request('screen');
          wl.addEventListener('release', () => setTimeout(requestWakeLock, 2000));
        }
      } catch(e) {}
    }
    requestWakeLock();
  </script>

</body>
</html>
