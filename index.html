<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bashoor Exchange - Live TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    canvas { position: fixed; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
  </style>
</head>
<body>

  <iframe
    id="mainFrame"
    src="https://bashoorexchange.com/tv.php"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
  ></iframe>

  <canvas id="keepAlive"></canvas>

  <script>
    // 1. WebGL pulse every 20s
    const canvas = document.getElementById('keepAlive');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      setInterval(() => {
        gl.clearColor(Math.random(), Math.random(), Math.random(), 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
      }, 20000);
    }

    // 2. Silent audio pulse every 30s
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (AudioCtx) {
        const audioCtx = new AudioCtx();
        setInterval(() => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          gain.gain.value = 0;
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.01);
        }, 30000);
      }
    } catch(e) {}

    // 3. Fake mouse movement every 25s
    setInterval(() => {
      document.dispatchEvent(new MouseEvent('mousemove', {
        bubbles: true,
        cancelable: true,
        clientX: Math.floor(Math.random() * window.innerWidth),
        clientY: Math.floor(Math.random() * window.innerHeight)
      }));
    }, 25000);

    // 4. Visibility recovery
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        setTimeout(() => { window.focus(); }, 1000);
      }
    });

    // 5. Reload every 55 minutes to keep data fresh
    setInterval(() => {
      const iframe = document.getElementById('mainFrame');
      iframe.src = iframe.src;
    }, 55 * 60 * 1000);

    // 6. Wake Lock API
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          const wl = await navigator.wakeLock.request('screen');
          wl.addEventListener('release', () => setTimeout(requestWakeLock, 2000));
        }
      } catch(e) {}
    }
    requestWakeLock();
  </script>

</body>
</html>
