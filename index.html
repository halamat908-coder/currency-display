<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bashoor Exchange - Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .frame-container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    iframe {
      border: none;
      display: block;
      transform-origin: top left;
      width: 1280px;
      height: 720px;
    }
    canvas {
      position: fixed;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }
  </style>
</head>
<body>

  <div class="frame-container" id="container">
    <iframe
      id="mainFrame"
      src="https://bashoorexchange.com"
      scrolling="no"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    ></iframe>
  </div>

  <canvas id="keepAlive"></canvas>

  <script>
    // ── Scale iframe to fit screen perfectly ─────────────────────
    function scaleIframe() {
      const iframe = document.getElementById('mainFrame');
      const container = document.getElementById('container');

      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      const siteW = 1280;
      const siteH = 900;

      const scaleX = screenW / siteW;
      const scaleY = screenH / siteH;
      const scale = Math.min(scaleX, scaleY);

      iframe.style.width = siteW + 'px';
      iframe.style.height = siteH + 'px';
      iframe.style.transform = `scale(${scale})`;
      iframe.style.transformOrigin = 'top left';

      const scaledW = siteW * scale;
      const scaledH = siteH * scale;
      container.style.paddingLeft = ((screenW - scaledW) / 2) + 'px';
      container.style.paddingTop = ((screenH - scaledH) / 2) + 'px';
    }

    window.addEventListener('load', scaleIframe);
    window.addEventListener('resize', scaleIframe);
    document.getElementById('mainFrame').addEventListener('load', scaleIframe);
    scaleIframe();

    // ── Keep-Alive Engine ────────────────────────────────────────
    const canvas = document.getElementById('keepAlive');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      setInterval(() => {
        gl.clearColor(Math.random(), Math.random(), Math.random(), 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
      }, 20000);
    }

    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (AudioCtx) {
        const audioCtx = new AudioCtx();
        setInterval(() => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          gain.gain.value = 0;
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.01);
        }, 30000);
      }
    } catch(e) {}

    setInterval(() => {
      document.dispatchEvent(new MouseEvent('mousemove', {
        bubbles: true,
        cancelable: true,
        clientX: Math.floor(Math.random() * window.innerWidth),
        clientY: Math.floor(Math.random() * window.innerHeight)
      }));
    }, 25000);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        setTimeout(() => { window.focus(); }, 1000);
      }
    });

    setInterval(() => {
      const iframe = document.getElementById('mainFrame');
      iframe.src = iframe.src;
    }, 55 * 60 * 1000);

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          const wl = await navigator.wakeLock.request('screen');
          wl.addEventListener('release', () => setTimeout(requestWakeLock, 2000));
        }
      } catch(e) {}
    }
    requestWakeLock();
  </script>

</body>
</html>
